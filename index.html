<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>    
    <main class="container">
        <div class="area-choice">
            <button id="by" class="area-button">
                City
            </button>
            <button id="mountain" class="area-button">
                Mountain
            </button>
            <button id="forest" class="area-button">
                Forest
            </button>
            <button id="river" class="area-button">
                River Valley
            </button>
        </div>

        <form class="user-inputs">
            <div class="form-group">
                <label for="size">Write size of the factory</label>
                <input id="size" type="text" placeholder="Write in m2...">
            </div>

            <div class="form-group">
                <label for="luftFiltrasjon">Sould the factory have air-filtrasjon?</label>
                <select name="luftFiltrasjon" id="luftFiltrasjon">
                    <option value="">-- Choose --</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="avfall">How should the waste be handled?</label>
                <select name="avfall" id="avfall">
                    <option value="">-- Choose --</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kilde">Where should the raw materials and natural resources come from?</label>
                <select name="kilde" id="kilde">
                    <option value="">-- Choose --</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <button type="submit" class="submit-button" id="submit_btn">Send inn</button>
        </form>

        <div id="results-container" class="results-container">
            <p id="resultsinfo"></p>
        </div>
    </main>
</body>
<script src="index.js"></script>

</html>
