<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elbilfabrikken</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>Make your factory</h1>
    
    <main class="container">
        <div id="title">Where do you want to put your factory?</div>
        <div class="area-choice">
            <button id="by" class="area-button">
                City
            </button>
            <button id="mountain" class="area-button">
                Mountain
            </button>
            <button id="forest" class="area-button">
                Forest
            </button>
            <button id="river" class="area-button">
                River Valley
            </button>
        </div>
        
        <div class="map-section">
            <h2>Map preview</h2>
            <div id="map"></div>
            <p class="map-hint">Click the map to place your factory and see the impact zones.</p>
        </div>

        <form class="user-inputs" >
            <div class="form-group">
                <label for="size">Write size of the factory</label>
                <input id="size" type="text" placeholder="Write in m2...">
            </div>

            <div class="form-group">
                <label for="luftFiltrasjon">Should the factory have air-filtrasjon?</label>
                <select name="luftFiltrasjon" id="luftFiltrasjon">
                    <option value="">-- Choose --</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="avfall">Should the factory use proper waste disposal?</label>
                <select name="avfall" id="avfall">
                    <option value="">-- Choose --</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kilde">Where should the raw materials and natural resources come from?</label>
                <select name="kilde" id="kilde">
                    <option value="">-- Choose --</option>
                    <option value="Norway">Norway</option>
                    <option value="Germany">Germany</option>
                    <option value="Brazil">Brazil</option>
                </select>
            </div>

            <button type="submit" class="submit-button" id="submit_btn">Send inn</button>
        </form>

        <div id="results-container" class="results-container">
            <p id="resultsinfo"></p>
        </div>
    </main>
</body>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="index.js"></script>

</html>
